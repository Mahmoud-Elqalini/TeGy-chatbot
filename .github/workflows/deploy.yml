name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push container image to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker build . -t ${{ secrets.ACR_LOGIN_SERVER }}/chatbot-app:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/chatbot-app:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Ensure containerapp extension is up to date
            az extension add --name containerapp --upgrade --yes

            # 1. Update Ingress and Port settings
            az containerapp ingress update \
              --name chatbot-app \
              --resource-group TeGy-chatbot \
              --target-port 8000 \
              --type external

            # 2. Update Image and Environment Variables
            az containerapp update \
              --name chatbot-app \
              --resource-group TeGy-chatbot \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/chatbot-app:${{ github.sha }} \
              --set-env-vars \
                ENV=production \
                DEBUG=True \
                DATABASE_URL_CHATBOT="${{ secrets.DATABASE_URL_CHATBOT }}" \
                SECRET_KEY="${{ secrets.SECRET_KEY }}" \
                GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
                GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
                OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
                REDIS_HOST="${{ secrets.REDIS_HOST }}" \
                REDIS_PORT="${{ secrets.REDIS_PORT }}" \
                REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
                AI_REQUEST_TIMEOUT=60
