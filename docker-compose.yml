version: '3.8'

services:
  app:
    build: .
    image: chatbot-app:latest
    container_name: chatbot-backend
    restart: always
    env_file: .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"

  arq-worker:
    build: .
    image: chatbot-app:latest
    container_name: chatbot-arq-worker
    restart: always
    env_file: .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
      - postgres
    command: arq app.workers.arq_jobs.WorkerSettings

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-""}
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    container_name: chatbot-postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-chatbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
