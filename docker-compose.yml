version: '3.8'

services:
  app:
    build: .
    image: chatbot-app:latest
    container_name: chatbot-backend
    restart: always
    environment:
      - ENV=production
      - DEBUG=False
      - DATABASE_URL_CHATBOT=${DATABASE_URL_CHATBOT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}

      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - AI_REQUEST_TIMEOUT=60
    depends_on:
      - redis
    ports:
      - "8000:8000"

  arq-worker:
    build: .
    image: chatbot-app:latest
    container_name: chatbot-arq-worker
    restart: always
    environment:
      - ENV=production
      - DEBUG=False
      - DATABASE_URL_CHATBOT=${DATABASE_URL_CHATBOT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - AI_REQUEST_TIMEOUT=60
    depends_on:
      - redis
    command: arq app.workers.arq_jobs.WorkerSettings

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
